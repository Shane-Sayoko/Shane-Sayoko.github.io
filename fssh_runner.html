"use strict";
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

function resize(){
  canvas.width=window.innerWidth*devicePixelRatio;
  canvas.height=window.innerHeight*devicePixelRatio;
  ctx.scale(devicePixelRatio,devicePixelRatio);
}
resize();
window.addEventListener('resize',resize);
const W=()=>canvas.width/devicePixelRatio;
const H=()=>canvas.height/devicePixelRatio;
function S(){return Math.min(W(),H())/900;}

// --- Audio (pre-rendered buffers — zero per-call allocation) ---
let audioCtx=null;
let audioGain=null;
const sfxBuffers={};
function ensureAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  audioGain=audioCtx.createGain();
  audioGain.connect(audioCtx.destination);
  // Pre-render all sound effects into AudioBuffers
  function renderTone(freq,dur,type,vol,slide){
    const sr=audioCtx.sampleRate;
    const len=Math.ceil(sr*dur);
    const buf=audioCtx.createBuffer(1,len,sr);
    const d=buf.getChannelData(0);
    for(let i=0;i<len;i++){
      const t=i/sr;const frac=t/dur;
      const f=slide?freq+(slide*t/dur):freq;
      const phase=2*Math.PI*f*t;
      let sample=0;
      if(type==='sine')sample=Math.sin(phase);
      else if(type==='sawtooth'){const p=(f*t)%1;sample=2*p-1;}
      else if(type==='triangle'){const p=(f*t)%1;sample=4*Math.abs(p-0.5)-1;}
      // Exponential decay envelope
      const env=vol*Math.pow(0.001/vol,frac);
      d[i]=sample*env;
    }
    return buf;
  }
  sfxBuffers.hop=renderTone(440,0.15,'sine',0.12,300);
  sfxBuffers.frustrated=renderTone(150,0.4,'sawtooth',0.15,-80);
  sfxBuffers.photon=renderTone(880,0.1,'sine',0.1,200);
  sfxBuffers.phonon=renderTone(220,0.12,'triangle',0.08,0);
  sfxBuffers.ci1=renderTone(523,0.3,'sine',0.1,0);
  sfxBuffers.ci2=renderTone(659,0.3,'sine',0.08,0);
  sfxBuffers.ci3=renderTone(784,0.4,'sine',0.08,0);
  sfxBuffers.go1=renderTone(440,0.2,'sawtooth',0.1,-200);
  sfxBuffers.go2=renderTone(330,0.3,'sawtooth',0.08,-150);
}
function playBuf(name,delay){
  if(!audioCtx||!sfxBuffers[name])return;
  const s=audioCtx.createBufferSource();
  s.buffer=sfxBuffers[name];
  s.connect(audioGain);
  s.start(audioCtx.currentTime+(delay||0));
  s.onended=()=>{s.disconnect();};
}
function sfxHop(){playBuf('hop');}
function sfxFrustrated(){playBuf('frustrated');}
function sfxPhoton(){playBuf('photon');}
function sfxPhonon(){playBuf('phonon');}
function sfxCI(){playBuf('ci1');playBuf('ci2',0.1);playBuf('ci3',0.2);}
function sfxGameOver(){playBuf('go1');playBuf('go2',0.2);}

// --- Constants ---
const NUM_SURFACES=4;
const SURFACE_COLORS=['#00ffcc','#66ff44','#ffaa22','#ff44ff'];
const SURFACE_GLOW=['rgba(0,255,204,0.4)','rgba(102,255,68,0.4)','rgba(255,170,34,0.4)','rgba(255,68,255,0.4)'];
const SURFACE_NAMES=['S\u2080','S\u2081','S\u2082','S\u2083'];
const BAND_COLORS=[[0,255,230],[220,255,60],[255,160,255]];
const SURFACE_RGB=[[0,255,204],[102,255,68],[255,170,34],[255,68,255]];

// --- Game State ---
const STATE={MENU:0,INSTRUCTIONS:1,PLAYING:2,PAUSED:3,GAMEOVER:4,NAME_INPUT:5};
let state=STATE.MENU;
let score=0,distance=0,highScore=0;
let photonsCollected=0,phononsCollected=0;
let coherence=0,maxCoherence=0;
let frustration=0;
let currentSurface=0;
let totalEnergy=600;
let scrollSpeed=2;
let scrollOffset=0;
let gameTime=0;
let timeSinceLastHop=0;

// --- Online Leaderboard via Cloudflare Worker Proxy ---
// Set PROXY_URL to your Cloudflare Worker URL (e.g. 'https://fssh-leaderboard.xxx.workers.dev')
// The proxy handles GitHub Gist read/write with the token stored server-side.
const PROXY_URL='https://fssh-leaderboard.shanerain33.workers.dev';

let leaderboard=[];
let lbSyncing=false;
let lbError='';

// --- Player name persistence (localStorage) ---
function getSavedName(){return localStorage.getItem('fssh_player_name')||'';}
function savePlayerName(n){if(n)localStorage.setItem('fssh_player_name',n);}

// --- Local cache ---
function loadLocal(){try{leaderboard=JSON.parse(localStorage.getItem('fssh_lb'))||[];}catch(e){leaderboard=[];}leaderboard=leaderboard.slice(0,10);}
function saveLocal(){try{localStorage.setItem('fssh_lb',JSON.stringify(leaderboard.slice(0,10)));}catch(e){}}

function lbConfigured(){return PROXY_URL!=='YOUR_PROXY_URL_HERE';}

async function fetchLeaderboard(){
  if(!lbConfigured()){loadLocal();return;}
  try{
    lbSyncing=true;lbError='';
    const r=await fetch(PROXY_URL);
    if(!r.ok)throw new Error('GET '+r.status);
    const remote=await r.json();
    leaderboard=Array.isArray(remote)?remote.slice(0,10):[];
    saveLocal();
  }catch(e){lbError=e.message;loadLocal();}
  finally{lbSyncing=false;highScore=leaderboard.length>0?leaderboard[0].score:0;}
}

async function addToLeaderboard(name,s){
  leaderboard.push({name:name||'???',score:s});
  leaderboard.sort((a,b)=>b.score-a.score);
  leaderboard=leaderboard.slice(0,10);
  saveLocal();
  if(!lbConfigured())return;
  try{
    lbSyncing=true;lbError='';
    const r=await fetch(PROXY_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:name||'???',score:s})
    });
    if(!r.ok)throw new Error('POST '+r.status);
    const top10=await r.json();
    if(Array.isArray(top10))leaderboard=top10.slice(0,10);
    saveLocal();
  }catch(e){lbError=e.message;}
  finally{lbSyncing=false;highScore=leaderboard.length>0?leaderboard[0].score:0;}
}

function isTopTen(s){return leaderboard.length<10||s>leaderboard[leaderboard.length-1].score;}

fetchLeaderboard();

let nameCursorBlink=0;

// Surface generation
const phases=[];for(let i=0;i<6;i++)phases.push(Math.random()*Math.PI*2);
const gapPhaseSets=[];
for(let s=0;s<NUM_SURFACES-1;s++){
  const p=[];for(let i=0;i<4;i++)p.push(Math.random()*Math.PI*2);
  gapPhaseSets.push(p);
}

let avoidedCrossings=[];
let conicalIntersections=[];
let nextCITime=0;
let activeCouplingZone=null;

let playerX=0,playerY=0;
// Ring buffer for player trail — no shift(), no per-frame object creation
const TRAIL_MAX=30;
const playerTrail=[];for(let i=0;i<TRAIL_MAX;i++)playerTrail.push({x:0,y:0,age:0,surf:0,active:false});
let trailHead=0,trailLen=0;
let playerFlash=0,playerShake=0;
let speedTransition=0,targetSpeed=0;
let frustratedText='';let frustratedTextTimer=0;

let collectibles=[];
// Particle pool — pre-allocate to avoid per-spawn object creation
const PARTICLE_MAX=150;
const particles=[];for(let i=0;i<PARTICLE_MAX;i++)particles.push({x:0,y:0,vx:0,vy:0,life:0,maxLife:0,color:'',size:0});
let particleCount=0;
let nextCollectibleDist=300;

let hopUpPressed=false;
let hopDownPressed=false;

// --- Buttons ---
const buttons=[];// {id, x, y, w, h, text, color}
let buttonCount=0;
function addButton(id,x,y,w,h,text,color){
  if(buttonCount<buttons.length){const b=buttons[buttonCount];b.id=id;b.x=x;b.y=y;b.w=w;b.h=h;b.text=text;b.color=color;}
  else buttons.push({id,x,y,w,h,text,color});
  buttonCount++;
}
function clearButtons(){buttonCount=0;}
function hitTest(mx,my){
  for(let i=0;i<buttonCount;i++){
    const b=buttons[i];
    if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h)return b.id;
  }
  return null;
}
function drawButtons(){
  const sc=S();
  for(let i=0;i<buttonCount;i++){const b=buttons[i];
    // Button background
    ctx.fillStyle='rgba(20,20,40,0.8)';
    ctx.strokeStyle=b.color||'#66aaff';
    ctx.lineWidth=2*sc;
    const r=8*sc;
    ctx.beginPath();
    ctx.moveTo(b.x+r,b.y);ctx.lineTo(b.x+b.w-r,b.y);ctx.quadraticCurveTo(b.x+b.w,b.y,b.x+b.w,b.y+r);
    ctx.lineTo(b.x+b.w,b.y+b.h-r);ctx.quadraticCurveTo(b.x+b.w,b.y+b.h,b.x+b.w-r,b.y+b.h);
    ctx.lineTo(b.x+r,b.y+b.h);ctx.quadraticCurveTo(b.x,b.y+b.h,b.x,b.y+b.h-r);
    ctx.lineTo(b.x,b.y+r);ctx.quadraticCurveTo(b.x,b.y,b.x+r,b.y);
    ctx.closePath();ctx.fill();ctx.stroke();
    // Text
    const fs=Math.round(Math.min(20*sc,b.h*0.5));
    ctx.font=`bold ${fs}px "Courier New",monospace`;
    ctx.fillStyle=b.color||'#66aaff';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(b.text,b.x+b.w/2,b.y+b.h/2);
    ctx.textBaseline='alphabetic';
  }
}

// --- Difficulty ---
function getDifficulty(){
  if(distance<1000)return distance/1000*0.3;
  if(distance<2500)return 0.3+(distance-1000)/1500*0.4;
  if(distance<5000)return 0.7+(distance-2500)/2500*0.25;
  return 0.95+Math.min((distance-5000)/10000,0.05);
}
function getDifficultyLabel(){
  if(distance<1000)return'Easy';
  if(distance<2500)return'Medium';
  if(distance<5000)return'Hard';
  return'Extreme';
}

// --- Surface Generation ---
function surfaceBase(x){
  const diff=getDifficulty();
  let v=0;
  for(let i=0;i<5;i++){
    const freq=0.0008*(i+1)*(1+diff*0.5);
    const amp=(50+diff*30)/(i+1);
    v+=Math.sin(x*freq+phases[i])*amp;
  }
  return v;
}
function surfaceSmooth(surfIndex,x){
  if(surfIndex===0)return surfaceBase(x);
  const r=surfIndex*8;
  return(surfaceBase(x-r)+surfaceBase(x)+surfaceBase(x+r))/3;
}

function gapBetween(pairIndex,x){
  const diff=getDifficulty();
  const gapPhases=gapPhaseSets[pairIndex];
  let baseGap=90+pairIndex*12-diff*12;
  let variation=0;
  for(let i=0;i<3;i++){
    const freq=0.0006*(i+1)*(1+diff*0.2)*(1+pairIndex*0.1);
    const amp=6+diff*3;
    variation+=Math.sin(x*freq+gapPhases[i])*amp;
  }
  let gap=baseGap+variation;
  for(const ac of avoidedCrossings){
    if(ac.pairIndex!==pairIndex)continue;
    const dx=x-ac.x,aw=ac.width;
    if(Math.abs(dx)<aw*5){
      gap=gap*(1-Math.exp(-(dx*dx)/(aw*aw*2.0))*0.94);
      gap=Math.max(gap,ac.minGap);
    }
  }
  for(const ci of conicalIntersections){
    if(ci.pairIndex!==pairIndex)continue;
    const dx=x-ci.x,cw=ci.width;
    if(Math.abs(dx)<cw*3){gap=gap*(1-Math.exp(-(dx*dx)/(cw*cw*0.2)));}
  }
  return Math.max(gap,0);
}

function cumulativeGap(surfIndex,x){
  let total=0;for(let i=0;i<surfIndex;i++)total+=gapBetween(i,x);return total;
}
function surfaceY(screenX,surfIndex){
  const x=screenX+scrollOffset;
  const centerY=H()*0.75;
  const displaySpread=2.0;
  return centerY+surfaceSmooth(surfIndex,x)-cumulativeGap(surfIndex,x)*displaySpread;
}
function surfacePotential(surfIndex,worldX){return cumulativeGap(surfIndex,worldX);}

// --- Surface Y Cache ---
const CACHE_STEP=3;
const WORKER_BUFFER=40;// extra steps each side in Worker for scroll drift
let surfCache=[];// surfCache[surfIndex] = Float64Array
let cacheLen=0;
let cacheValid=false;
let cacheWorldStart=0;// world X at cache index 0

// Device-pixel-aligned scroll offset for rendering — set once per frame in loop()
// ALL draw code and visual cachedY calls use this instead of raw scrollOffset
let renderScroll=0;

// No more Path2D — draw surfaces directly each frame from cachedY
// This avoids creating new objects every frame (GC pressure = stutter)

// --- Web Worker for parallel surface cache computation ---
const _workerSrc=`'use strict';
const NS=4,CS=3;
function gDiff(d){
  if(d<1000)return d/1000*0.3;
  if(d<2500)return 0.3+(d-1000)/1500*0.4;
  if(d<5000)return 0.7+(d-2500)/2500*0.25;
  return 0.95+Math.min((d-5000)/10000,0.05);
}
function sBase(x,diff,ph){
  let v=0;
  for(let i=0;i<5;i++){v+=Math.sin(x*0.0008*(i+1)*(1+diff*0.5)+ph[i])*(50+diff*30)/(i+1);}
  return v;
}
function sSmooth(si,x,diff,ph){
  if(si===0)return sBase(x,diff,ph);
  const r=si*8;
  return(sBase(x-r,diff,ph)+sBase(x,diff,ph)+sBase(x+r,diff,ph))/3;
}
function gBetween(pi,x,diff,gps,acs,cis){
  const gp=gps[pi];
  let bg=90+pi*12-diff*12,v=0;
  for(let i=0;i<3;i++){v+=Math.sin(x*0.0006*(i+1)*(1+diff*0.2)*(1+pi*0.1)+gp[i])*(6+diff*3);}
  let gap=bg+v;
  for(let a=0;a<acs.length;a+=4){
    if(acs[a]!==pi)continue;
    const dx=x-acs[a+1],aw=acs[a+2];
    if(dx>-aw*5&&dx<aw*5){gap=gap*(1-Math.exp(-(dx*dx)/(aw*aw*2))*0.94);gap=Math.max(gap,acs[a+3]);}
  }
  for(let c=0;c<cis.length;c+=3){
    if(cis[c]!==pi)continue;
    const dx=x-cis[c+1],cw=cis[c+2];
    if(dx>-cw*3&&dx<cw*3){gap=gap*(1-Math.exp(-(dx*dx)/(cw*cw*0.2)));}
  }
  return gap>0?gap:0;
}
self.onmessage=function(e){
  const d=e.data,wStart=d.wStart,diff=gDiff(d.dist),ph=d.ph,gps=d.gps,acs=d.acs,cis=d.cis;
  const cY=d.sH*0.75,sp=2.0,steps=d.steps;
  const out=new Float64Array(steps*NS);
  for(let i=0;i<steps;i++){
    const wx=wStart+i*CS;let cg=0;
    for(let s=0;s<NS;s++){
      const sm=sSmooth(s,wx,diff,ph);
      if(s>0)cg+=gBetween(s-1,wx,diff,gps,acs,cis);
      out[s*steps+i]=cY+sm-cg*sp;
    }
  }
  self.postMessage({buf:out,steps:steps,id:d.id,wStart:wStart},[out.buffer]);
};`;

let cacheWorker=null;
let workerPending=null;
let workerBusy=false;
let workerFrameId=0;
// Pre-allocated arrays for worker messages — avoid per-frame spread/map allocation
const _wkPh=new Array(6);
const _wkGps=[];for(let i=0;i<3;i++)_wkGps.push(new Array(4));

try{
  cacheWorker=new Worker(URL.createObjectURL(new Blob([_workerSrc],{type:'application/javascript'})));
  cacheWorker.onmessage=function(e){
    workerPending=e.data;
    workerBusy=false;
  };
}catch(e){cacheWorker=null;}

function requestWorkerCache(){
  if(!cacheWorker||workerBusy)return;
  const screenSteps=Math.ceil(W()/CACHE_STEP)+2;
  const steps=screenSteps+WORKER_BUFFER*2+1;
  const wStart=Math.floor((scrollOffset-WORKER_BUFFER*CACHE_STEP)/CACHE_STEP)*CACHE_STEP;
  // Build flat arrays for transfer (unavoidable allocation — buffers get detached)
  const acLen=avoidedCrossings.length*4;
  const acFlat=new Float64Array(acLen);
  for(let i=0;i<avoidedCrossings.length;i++){
    const a=avoidedCrossings[i];
    acFlat[i*4]=a.pairIndex;acFlat[i*4+1]=a.x;acFlat[i*4+2]=a.width;acFlat[i*4+3]=a.minGap;
  }
  const ciLen=conicalIntersections.length*3;
  const ciFlat=new Float64Array(ciLen);
  for(let i=0;i<conicalIntersections.length;i++){
    const c=conicalIntersections[i];
    ciFlat[i*3]=c.pairIndex;ciFlat[i*3+1]=c.x;ciFlat[i*3+2]=c.width;
  }
  // Copy phases into pre-allocated arrays (no spread/map allocation)
  for(let i=0;i<phases.length;i++)_wkPh[i]=phases[i];
  for(let i=0;i<gapPhaseSets.length;i++){const src=gapPhaseSets[i],dst=_wkGps[i];for(let j=0;j<src.length;j++)dst[j]=src[j];}
  workerFrameId++;workerBusy=true;
  cacheWorker.postMessage({
    wStart:wStart,dist:distance,
    ph:_wkPh,gps:_wkGps,
    acs:acFlat,cis:ciFlat,
    sH:H(),steps:steps,id:workerFrameId
  },[acFlat.buffer,ciFlat.buffer]);
}

function applyWorkerCache(){
  if(!workerPending)return false;
  const d=workerPending;workerPending=null;
  const steps=d.steps;
  if(cacheLen!==steps){
    cacheLen=steps;surfCache=[];
    for(let s=0;s<NUM_SURFACES;s++)surfCache.push(new Float64Array(steps));
  }
  const buf=d.buf;
  for(let s=0;s<NUM_SURFACES;s++){
    const arr=surfCache[s],off=s*steps;
    for(let i=0;i<steps;i++)arr[i]=buf[off+i];
  }
  cacheWorldStart=d.wStart;
  cacheValid=true;
  return true;
}

function buildSurfaceCache(){
  const w=W();
  // Snap to CACHE_STEP grid — same grid alignment as Worker cache
  const so=Math.floor(scrollOffset/CACHE_STEP)*CACHE_STEP;
  const steps=Math.ceil((scrollOffset+w-so)/CACHE_STEP)+3;
  if(cacheLen!==steps){
    cacheLen=steps;
    surfCache=[];
    for(let s=0;s<NUM_SURFACES;s++)surfCache.push(new Float64Array(steps));
  }
  const centerY=H()*0.75,spread=2.0;
  for(let i=0;i<steps;i++){
    const worldX=i*CACHE_STEP+so;
    let cumGap=0;
    for(let s=0;s<NUM_SURFACES;s++){
      const smooth=surfaceSmooth(s,worldX);
      if(s>0)cumGap+=gapBetween(s-1,worldX);
      surfCache[s][i]=centerY+smooth-cumGap*spread;
    }
  }
  cacheWorldStart=so;
  cacheValid=true;
}

function cachedY(screenX,surfIndex){
  if(!cacheValid)return surfaceY(screenX,surfIndex);
  // Use renderScroll (device-pixel-aligned) so all visual elements share the same world mapping
  const worldX=screenX+renderScroll;
  const idx=(worldX-cacheWorldStart)/CACHE_STEP;
  const i0=Math.floor(idx);
  if(i0<0||i0>=cacheLen-1)return surfaceY(screenX,surfIndex);
  const t=idx-i0;
  return surfCache[surfIndex][i0]*(1-t)+surfCache[surfIndex][i0+1]*t;
}

// --- Avoided Crossing & CI ---
function generateAvoidedCrossings(){
  const screenR=scrollOffset+W()*2;
  const diff=getDifficulty();
  const cutoff=scrollOffset-500;
  // In-place removal
  let w2=0;
  for(let i=0;i<avoidedCrossings.length;i++){
    if(avoidedCrossings[i].x>cutoff)avoidedCrossings[w2++]=avoidedCrossings[i];
  }
  avoidedCrossings.length=w2;
  // Find last X per pair with simple loop
  for(let pair=0;pair<NUM_SURFACES-1;pair++){
    let lastX=scrollOffset;
    for(let i=0;i<avoidedCrossings.length;i++){
      if(avoidedCrossings[i].pairIndex===pair&&avoidedCrossings[i].x>lastX)lastX=avoidedCrossings[i].x;
    }
    if(lastX<screenR){
      const spacing=600-diff*200+Math.random()*400;
      const width=50-diff*20+Math.random()*20;
      avoidedCrossings.push({pairIndex:pair,x:lastX+spacing,width:Math.max(width,20),minGap:2+Math.random()*4});
    }
  }
}
function generateCI(){
  if(gameTime>nextCITime){
    const x=scrollOffset+W()+200+Math.random()*300;
    const pair=Math.floor(Math.random()*(NUM_SURFACES-1));
    conicalIntersections.push({pairIndex:pair,x,width:35+Math.random()*20,time:gameTime});
    nextCITime=gameTime+30+Math.random()*15;
  }
  const cutoff=scrollOffset-W();
  let w2=0;
  for(let i=0;i<conicalIntersections.length;i++){
    if(conicalIntersections[i].x>cutoff)conicalIntersections[w2++]=conicalIntersections[i];
  }
  conicalIntersections.length=w2;
}
function couplingThreshold(){return 15+getDifficulty()*5;}
function checkCouplingForPair(pair){
  const worldX=playerX+scrollOffset;
  // Check CI first — hitbox matches visual band (ci.width*1.5)
  for(const ci of conicalIntersections){
    if(ci.pairIndex===pair&&Math.abs(worldX-ci.x)<ci.width*1.5)return'ci';
  }
  // Check avoided crossings — hitbox matches visual band (ac.width*0.8)
  for(const ac of avoidedCrossings){
    if(ac.pairIndex!==pair)continue;
    if(Math.abs(worldX-ac.x)<ac.width*0.8)return'avoided';
  }
  return null;
}

// --- Collectibles ---
function spawnCollectibles(){
  const diff=getDifficulty();
  const spawnX=scrollOffset+W()+50;
  if(spawnX>nextCollectibleDist){
    nextCollectibleDist=spawnX+100+Math.random()*80+diff*60;
    const surface=Math.floor(Math.random()*NUM_SURFACES);
    collectibles.push({x:spawnX,surface,isPhoton:surface>=2,phase:Math.random()*Math.PI*2,alive:true});
  }
  const cutoff=scrollOffset-50;
  let w2=0;
  for(let i=0;i<collectibles.length;i++){
    if(collectibles[i].x>cutoff&&collectibles[i].alive)collectibles[w2++]=collectibles[i];
  }
  collectibles.length=w2;
}

// --- Input ---
function handleClick(mx,my){
  ensureAudio();
  const btnId=hitTest(mx,my);
  if(btnId==='start'){state=STATE.INSTRUCTIONS;return;}
  if(btnId==='play'){startGame();return;}
  if(btnId==='retry'){startGame();return;}
  if(btnId==='menu'){state=STATE.MENU;fetchLeaderboard();return;}
  if(btnId==='resume'){state=STATE.PLAYING;return;}
  if(btnId==='quit_pause'){state=STATE.MENU;return;}
  if(btnId==='submit_name'){
    const pName=nameInput||'Anonymous';
    savePlayerName(pName);
    addToLeaderboard(pName,score);
    highScore=leaderboard.length>0?leaderboard[0].score:0;
    state=STATE.GAMEOVER;return;
  }
  // In-game: hop based on click position
  if(state===STATE.PLAYING){
    if(my<H()/2)hopUpPressed=true;else hopDownPressed=true;
  }
}

window.addEventListener('keydown',e=>{

// --- Game Init ---
function startGame(){
  state=STATE.PLAYING;
  score=0;distance=0;
  photonsCollected=0;phononsCollected=0;
  coherence=0;maxCoherence=0;
  frustration=0;currentSurface=0;
  scrollOffset=0;smoothScroll=0;scrollSpeed=2;
  gameTime=0;timeSinceLastHop=0;
  trailHead=0;trailLen=0;for(let i=0;i<TRAIL_MAX;i++)playerTrail[i].active=false;
  playerFlash=0;playerShake=0;
  collectibles=[];particleCount=0;
  avoidedCrossings=[];conicalIntersections=[];
  nextCITime=25+Math.random()*20;
  nextCollectibleDist=300;
  totalEnergy=600;speedTransition=0;
  frustratedText='';frustratedTextTimer=0;
  nameInput='';
  for(let i=0;i<phases.length;i++)phases[i]=Math.random()*Math.PI*2;
  for(const gp of gapPhaseSets)for(let i=0;i<gp.length;i++)gp[i]=Math.random()*Math.PI*2;
  cacheValid=false;workerPending=null;workerBusy=false;
}

// --- Update ---
function update(dt){
  if(state!==STATE.PLAYING)return;
  gameTime+=dt;timeSinceLastHop+=dt;
  generateAvoidedCrossings();generateCI();spawnCollectibles();
  playerX=W()*0.25;
  const worldX=playerX+scrollOffset;

  // Speed — mild potential influence
  const potential=surfacePotential(currentSurface,worldX);
  const baseSpeed=2+getDifficulty()*2;
  const potentialRatio=potential/totalEnergy;
  const kineticFactor=Math.max(0.1,1-potentialRatio*2.0);
  targetSpeed=baseSpeed*(0.5+kineticFactor*1.5);
  targetSpeed=Math.max(targetSpeed,1.0);
  if(speedTransition>0){speedTransition-=dt*3;scrollSpeed+=(targetSpeed-scrollSpeed)*dt*5;}
  else{scrollSpeed+=(targetSpeed-scrollSpeed)*dt*3;}
  scrollOffset+=scrollSpeed*60*dt;
  distance+=scrollSpeed*60*dt*0.1;
  playerY=cacheValid?cachedY(playerX,currentSurface):surfaceY(playerX,currentSurface);

  // Ring buffer trail — reuse pre-allocated objects
  const tSlot=playerTrail[trailHead];
  tSlot.x=playerX;tSlot.y=playerY;tSlot.age=0;tSlot.surf=currentSurface;tSlot.active=true;
  trailHead=(trailHead+1)%TRAIL_MAX;
  if(trailLen<TRAIL_MAX)trailLen++;
  for(let ti=0;ti<trailLen;ti++)playerTrail[ti].age+=dt;

  activeCouplingZone=null;
  if(currentSurface<NUM_SURFACES-1){const ct=checkCouplingForPair(currentSurface);if(ct)activeCouplingZone={pairIndex:currentSurface,type:ct,dir:'up'};}
  if(!activeCouplingZone&&currentSurface>0){const ct=checkCouplingForPair(currentSurface-1);if(ct)activeCouplingZone={pairIndex:currentSurface-1,type:ct,dir:'down'};}

  // Hop UP
  if(hopUpPressed){
    hopUpPressed=false;
    if(currentSurface>=NUM_SURFACES-1){triggerFrustrated('Already at highest surface!');}
    else{
      const pair=currentSurface,ct=checkCouplingForPair(pair);
      if(!ct){triggerFrustrated('No coupling zone!');}
      else if(ct==='ci'){
        currentSurface++;timeSinceLastHop=0;
        score+=Math.round(500*(1+2*coherence));coherence=Math.min(1,coherence+0.25);
        frustration=Math.max(0,frustration-10);speedTransition=1;sfxCI();spawnHopParticles(playerX,playerY,true);
      }else{
        const gapHere=gapBetween(pair,worldX);
        const eKinetic=totalEnergy-surfacePotential(currentSurface,worldX);
        if(eKinetic<gapHere){triggerFrustrated('Insufficient kinetic energy!');}
        else{currentSurface++;timeSinceLastHop=0;coherence=Math.min(1,coherence+0.25);speedTransition=1;score+=Math.round((40+gapHere*2)*(1+2*coherence));sfxHop();spawnHopParticles(playerX,playerY,false);}
      }
    }
  }
  // Hop DOWN
  if(hopDownPressed){
    hopDownPressed=false;
    if(currentSurface<=0){triggerFrustrated('Already at lowest surface!');}
    else{
      const pair=currentSurface-1,ct=checkCouplingForPair(pair);
      if(!ct){triggerFrustrated('No coupling zone!');}
      else if(ct==='ci'){
        currentSurface--;timeSinceLastHop=0;
        score+=Math.round(500*(1+2*coherence));coherence=Math.min(1,coherence+0.25);
        frustration=Math.max(0,frustration-10);speedTransition=1;sfxCI();spawnHopParticles(playerX,playerY,true);
      }else{
        currentSurface--;timeSinceLastHop=0;coherence=Math.min(1,coherence+0.25);speedTransition=1;
        score+=Math.round(30*(1+2*coherence));sfxHop();spawnHopParticles(playerX,playerY,false);
      }
    }
  }

  // Game over check BEFORE decay
  if(frustration>=100){
    frustration=100;state=STATE.GAMEOVER;sfxGameOver();
    // Check leaderboard
    if(isTopTen(score)){state=STATE.NAME_INPUT;nameInput=getSavedName();nameCursorBlink=0;}
    else{
      highScore=leaderboard.length>0?leaderboard[0].score:0;
    }
    return;
  }

  coherence*=Math.pow(0.97,60*dt);
  maxCoherence=Math.max(maxCoherence,1+2*coherence);
  frustration=Math.max(0,frustration-0.15*dt);

  // Decoherence drift
  const gracePeriod=4;
  if(timeSinceLastHop>gracePeriod){
    const overTime=timeSinceLastHop-gracePeriod;
    const decoherenceRate=3+overTime*2+getDifficulty()*3;
    frustration=Math.min(100,frustration+decoherenceRate*dt);
  }

  playerFlash=Math.max(0,playerFlash-dt*3);
  playerShake=Math.max(0,playerShake-dt*2.5);
  frustratedTextTimer=Math.max(0,frustratedTextTimer-dt);

  const sc=S();const collectRadius=900*sc*sc;
  for(const c of collectibles){
    if(!c.alive)continue;
    const cx=c.x-scrollOffset;
    const cy=cachedY(cx,c.surface)+Math.sin(gameTime*3+c.phase)*8;
    const dx=playerX-cx,dy=playerY-cy;
    if(dx*dx+dy*dy<collectRadius){
      c.alive=false;
      const mult=1+2*coherence;
      const surfaceScore=[20,50,100,150][c.surface]||50;
      if(c.isPhoton){score+=Math.round(surfaceScore*mult);photonsCollected++;sfxPhoton();}
      else{score+=Math.round(surfaceScore*mult);phononsCollected++;sfxPhonon();}
      for(let i=0;i<8&&particleCount<PARTICLE_MAX;i++){const angle=Math.PI*2*i/8;const p=particles[particleCount++];p.x=cx;p.y=cy;p.vx=Math.cos(angle)*80+Math.random()*20;p.vy=Math.sin(angle)*80+Math.random()*20;p.life=0.5;p.maxLife=0.5;p.color=c.isPhoton?'#ffd700':'#4488ff';p.size=3*sc;}
    }
  }
  // Update particles in-place, compact live ones to front
  let pw=0;
  for(let i=0;i<particleCount;i++){
    const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;
    if(p.life>0){if(pw!==i){const t=particles[pw];particles[pw]=particles[i];particles[i]=t;}pw++;}
  }
  particleCount=pw;
}

function triggerFrustrated(msg){
  frustration=Math.min(100,frustration+18);playerFlash=0.7;playerShake=0.6;
  frustratedText=msg;frustratedTextTimer=1.5;sfxFrustrated();
  const sc=S();
  for(let i=0;i<12&&particleCount<PARTICLE_MAX;i++){const angle=Math.PI*2*i/12;const p=particles[particleCount++];p.x=playerX;p.y=playerY;p.vx=Math.cos(angle)*60;p.vy=Math.sin(angle)*60;p.life=0.4;p.maxLife=0.4;p.color='#ff3333';p.size=3*sc;}
}
function spawnHopParticles(x,y,isCI){
  const count=isCI?16:10;const color=isCI?'#ffffff':SURFACE_COLORS[currentSurface];const sc=S();
  const room=PARTICLE_MAX-particleCount;if(room<=0)return;
  const n=Math.min(count,room);
  for(let i=0;i<n;i++){const angle=Math.PI*2*i/count;const speed=isCI?150:100;const p=particles[particleCount++];p.x=x;p.y=y;p.vx=Math.cos(angle)*speed*(0.5+Math.random()*0.5);p.vy=Math.sin(angle)*speed*(0.5+Math.random()*0.5);p.life=0.6;p.maxLife=0.6;p.color=color;p.size=(isCI?4:3)*sc;}
}

// --- Draw ---
function draw(){
  const w=W(),h=H();
  ctx.clearRect(0,0,w,h);ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,w,h);
  clearButtons();
  if(state===STATE.MENU){drawMenu();drawButtons();return;}
  if(state===STATE.INSTRUCTIONS){drawInstructions();drawButtons();return;}
  // Cache already built in loop() before draw()
  drawGrid();drawCouplingBands();drawSurfaces();drawCollectibles();drawPlayer();drawParticles();drawHUD();
  if(state===STATE.PAUSED){drawPaused();drawButtons();}
  if(state===STATE.GAMEOVER){drawGameOver();drawButtons();}
  if(state===STATE.NAME_INPUT){drawNameInput();drawButtons();}
}

function drawGrid(){
  const w=W(),h=H();ctx.strokeStyle='rgba(30,60,90,0.12)';ctx.lineWidth=0.5;
  const sp=60;const ox=(renderScroll*0.3)%sp;
  ctx.beginPath();
  for(let x=-ox;x<w;x+=sp){ctx.moveTo(x,0);ctx.lineTo(x,h);}
  for(let y=0;y<h;y+=sp){ctx.moveTo(0,y);ctx.lineTo(w,y);}
  ctx.stroke();
}
function drawSurfaces(){
  if(!cacheValid)return;
  const sc=S(),w=W(),dpr=devicePixelRatio;
  // Draw directly from cachedY — no Path2D allocation, no GC stutter
  // Quantize Y to device pixels for stable anti-aliasing (no shimmer)
  for(let s=0;s<NUM_SURFACES;s++){
    const rgb=SURFACE_RGB[s];
    ctx.beginPath();
    for(let sx=0;sx<=w;sx+=CACHE_STEP){
      const y=Math.round(cachedY(sx,s)*dpr)/dpr;
      if(sx===0)ctx.moveTo(sx,y);else ctx.lineTo(sx,y);
    }
    ctx.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.12)`;ctx.lineWidth=8*sc;ctx.stroke();
    ctx.strokeStyle=SURFACE_COLORS[s];ctx.lineWidth=2.5*sc;ctx.stroke();
  }
  // Labels
  for(let s=0;s<NUM_SURFACES;s++){
    const labelY=cachedY(5,s);
    ctx.font=`bold ${Math.round(14*sc)}px "Courier New",monospace`;
    ctx.fillStyle=SURFACE_COLORS[s];ctx.textAlign='left';ctx.globalAlpha=0.6;
    ctx.fillText(SURFACE_NAMES[s],8,labelY-8*sc);ctx.globalAlpha=1;
  }
}
function drawCouplingBands(){
  const w=W(),sc=S(),threshold=couplingThreshold();
  const pulse=0.7+0.3*Math.sin(gameTime*4);

  // Draw bands directly from avoided crossing positions — no pixel scanning, no jitter
  for(const ac of avoidedCrossings){
    const pair=ac.pairIndex;
    const bc=BAND_COLORS[pair];
    // Compute the visible band extent: where the gap < threshold
    // The Gaussian is gap*(1 - 0.94*exp(-dx^2/(w^2*0.25))), solve for gap result < threshold
    // Approximate: the band spans roughly ac.width * 1.2 on each side of center
    const halfSpan=ac.width*0.8;
    const bandStartWorld=ac.x-halfSpan;
    const bandEndWorld=ac.x+halfSpan;
    const bsScreen=bandStartWorld-renderScroll;
    const beScreen=bandEndWorld-renderScroll;
    // Skip if fully off screen
    if(beScreen<-10||bsScreen>w+10)continue;
    const drawStart=Math.max(0,bsScreen);
    const drawEnd=Math.min(w,beScreen);
    if(drawEnd-drawStart<3)continue;

    // Check if this AC overlaps a CI
    let isCI=false;
    for(const ci of conicalIntersections){
      if(ci.pairIndex===pair&&Math.abs(ac.x-ci.x)<ac.width+ci.width){isCI=true;break;}
    }

    // Build shape path
    const step=CACHE_STEP;
    ctx.beginPath();
    for(let bx=drawStart;bx<=drawEnd;bx+=step)ctx.lineTo(bx,cachedY(bx,pair));
    for(let bx=drawEnd;bx>=drawStart;bx-=step)ctx.lineTo(bx,cachedY(bx,pair+1));
    ctx.closePath();

    if(isCI){
      ctx.fillStyle=`rgba(255,255,255,${0.25*pulse})`;ctx.strokeStyle=`rgba(255,255,255,${0.6*pulse})`;ctx.lineWidth=2.5*sc;
    }else{
      ctx.fillStyle=`rgba(${bc[0]},${bc[1]},${bc[2]},${0.35*pulse})`;
      ctx.strokeStyle=`rgba(${bc[0]},${bc[1]},${bc[2]},${0.65*pulse})`;ctx.lineWidth=1.5*sc;
    }
    ctx.fill();ctx.stroke();

    if(!isCI){
      // Edge glow — single pass instead of 4 separate strokes
      ctx.strokeStyle=`rgba(${bc[0]},${bc[1]},${bc[2]},${0.2*pulse})`;ctx.lineWidth=3*sc;
      ctx.beginPath();for(let bx=drawStart;bx<=drawEnd;bx+=step){const y=cachedY(bx,pair+1);if(bx===drawStart)ctx.moveTo(bx,y);else ctx.lineTo(bx,y);}ctx.stroke();
      ctx.beginPath();for(let bx=drawStart;bx<=drawEnd;bx+=step){const y=cachedY(bx,pair);if(bx===drawStart)ctx.moveTo(bx,y);else ctx.lineTo(bx,y);}ctx.stroke();
    }
  }
  // CI bands (not attached to an AC)
  for(const ci of conicalIntersections){
    const pair=ci.pairIndex;
    const halfSpan=ci.width*1.5;
    const bs=ci.x-halfSpan-renderScroll,be=ci.x+halfSpan-renderScroll;
    if(be<-10||bs>w+10)continue;
    // Check if already drawn as part of an AC
    let coveredByAC=false;
    for(const ac of avoidedCrossings){if(ac.pairIndex===pair&&Math.abs(ac.x-ci.x)<ac.width+ci.width){coveredByAC=true;break;}}
    if(!coveredByAC){
      const ds=Math.max(0,bs),de=Math.min(w,be);
      if(de-ds>3){
        ctx.beginPath();
        for(let bx=ds;bx<=de;bx+=CACHE_STEP)ctx.lineTo(bx,cachedY(bx,pair));
        for(let bx=de;bx>=ds;bx-=CACHE_STEP)ctx.lineTo(bx,cachedY(bx,pair+1));
        ctx.closePath();
        ctx.fillStyle=`rgba(255,255,255,${0.25*pulse})`;ctx.strokeStyle=`rgba(255,255,255,${0.6*pulse})`;ctx.lineWidth=2.5*sc;
        ctx.fill();ctx.stroke();
      }
    }
  }
  for(const ci of conicalIntersections){
    const cx=ci.x-renderScroll;
    if(cx>-100&&cx<w+100){
      const y0=cachedY(cx,ci.pairIndex),y1=cachedY(cx,ci.pairIndex+1),cy=(y0+y1)/2;
      const t=gameTime*3;ctx.save();ctx.translate(cx,cy);ctx.lineWidth=2*sc;
      // Batch arcs into one path per 2 rings to reduce draw calls
      const maxR=45*sc,step=8*sc;
      for(let r=5;r<maxR;r+=step){
        const alpha=0.6-r/(75*sc);if(alpha<=0)break;
        ctx.strokeStyle=`rgba(255,255,255,${alpha})`;ctx.beginPath();
        ctx.arc(0,0,r,t+r*0.1,t+r*0.1+Math.PI*1.5);
        if(r+step*0.5<maxR){const r2=r+step*0.5;ctx.moveTo(r2*Math.cos(t+r2*0.1),r2*Math.sin(t+r2*0.1));ctx.arc(0,0,r2,t+r2*0.1,t+r2*0.1+Math.PI*1.5);}
        ctx.stroke();
      }
      ctx.restore();
    }
  }
}
function drawCollectibles(){
  const sc=S(),ww=W();
  for(const c of collectibles){
    if(!c.alive)continue;const cx=c.x-renderScroll;
    if(cx<-30||cx>ww+30)continue;
    const cy=cachedY(cx,c.surface)+Math.sin(gameTime*3+c.phase)*8*sc;
    if(c.isPhoton){
      // Glow halo (replaces shadowBlur)
      ctx.fillStyle='rgba(255,215,0,0.15)';ctx.beginPath();ctx.arc(cx,cy,14*sc,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(cx,cy,7*sc,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(255,215,0,0.35)';ctx.lineWidth=1.5*sc;ctx.beginPath();
      for(let i=-18;i<18;i++){const px=cx+i*sc,py=cy+Math.sin(i*0.5+gameTime*6)*4*sc;if(i===-18)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.stroke();
    }else{
      ctx.fillStyle='rgba(68,136,255,0.12)';ctx.beginPath();ctx.arc(cx,cy,12*sc,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#4488ff';ctx.beginPath();ctx.arc(cx,cy,6*sc,0,Math.PI*2);ctx.fill();
      for(let r=1;r<=2;r++){const radius=(8+r*7)*sc+((gameTime*30)%18)*sc;const alpha=0.25-r*0.08;if(alpha>0){ctx.strokeStyle=`rgba(68,136,255,${alpha})`;ctx.lineWidth=sc;ctx.beginPath();ctx.arc(cx,cy,radius,0,Math.PI*2);ctx.stroke();}}
    }
  }
}
function drawPlayer(){
  const sc=S();let px=playerX,py=playerY;
  if(playerShake>0){px+=Math.sin(gameTime*60)*playerShake*10*sc;py+=Math.cos(gameTime*45)*playerShake*6*sc;}
  for(let ti=0;ti<trailLen-1;ti++){
    // Read in order: oldest first (ring buffer)
    const idx=(trailHead-trailLen+ti+TRAIL_MAX)%TRAIL_MAX;
    const t=playerTrail[idx];if(!t.active)continue;
    const alpha=(ti/trailLen)*0.4;
    const rgb=SURFACE_RGB[t.surf];
    ctx.fillStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha})`;ctx.beginPath();ctx.arc(t.x,t.y,(3+ti/trailLen*6)*0.3*sc,0,Math.PI*2);ctx.fill();
  }
  // Glow halo (replaces shadowBlur)
  if(playerFlash>0){
    ctx.fillStyle=`rgba(255,30,30,0.2)`;ctx.beginPath();ctx.arc(px,py,24*sc,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(255,${30+Math.sin(gameTime*40)*50+50|0},30,1)`;
  }else{
    const rgb=SURFACE_RGB[currentSurface];
    ctx.fillStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.12)`;ctx.beginPath();ctx.arc(px,py,22*sc,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.25)`;ctx.beginPath();ctx.arc(px,py,16*sc,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=SURFACE_COLORS[currentSurface];
  }
  ctx.beginPath();ctx.arc(px,py,11*sc,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.7)';ctx.beginPath();ctx.arc(px,py,4*sc,0,Math.PI*2);ctx.fill();
  // Decoherence ring
  const grace=4;
  if(timeSinceLastHop>grace*0.6){
    const urgency=Math.min(1,(timeSinceLastHop-grace*0.6)/(grace*0.8));
    const ringAlpha=urgency*0.5*(0.5+0.5*Math.sin(gameTime*4+urgency*4));
    ctx.strokeStyle=`rgba(255,${150-urgency*150|0},${50-urgency*50|0},${ringAlpha})`;
    ctx.lineWidth=2*sc;ctx.beginPath();ctx.arc(px,py,16*sc+urgency*6*sc,0,Math.PI*2);ctx.stroke();
  }
  if(frustratedTextTimer>0){
    const fs=Math.round(22*sc);ctx.font=`bold ${fs}px "Courier New",monospace`;ctx.textAlign='center';
    const alpha=Math.min(1,frustratedTextTimer);ctx.fillStyle=`rgba(255,80,80,${alpha})`;
    ctx.fillText(frustratedText,px,py-35*sc-((1.5-frustratedTextTimer)*20*sc));
  }
}
function drawParticles(){
  for(let i=0;i<particleCount;i++){const p=particles[i];const alpha=p.life/p.maxLife;ctx.globalAlpha=alpha;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*alpha,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
}
function drawHUD(){
  const w=W(),h=H(),sc=S();
  const pad=20*sc,topH=52*sc,botH=42*sc;
  ctx.fillStyle='rgba(10,10,26,0.85)';ctx.fillRect(0,0,w,topH);
  const mainFs=Math.round(22*sc);
  ctx.font=`bold ${mainFs}px "Courier New",monospace`;ctx.fillStyle='#ddeeff';ctx.textAlign='left';
  ctx.fillText(`Score: ${score}`,pad,topH*0.67);
  // Multiplier
  const mult=(1+2*coherence).toFixed(1);
  const multColor=coherence>0.3?`hsl(${60+coherence*160},100%,${60+coherence*20}%)`:'#777';
  ctx.textAlign='center';ctx.fillStyle=multColor;
  ctx.fillText(`\u00d7${mult}`,w*0.35,topH*0.67);
  // Surface
  const surfFs=Math.round(18*sc);ctx.font=`bold ${surfFs}px "Courier New",monospace`;
  ctx.fillStyle=SURFACE_COLORS[currentSurface];ctx.fillText(`[ ${SURFACE_NAMES[currentSurface]} ]`,w*0.48,topH*0.67);
  // Frustration bar
  ctx.font=`bold ${mainFs}px "Courier New",monospace`;
  const barW=Math.min(220*sc,w*0.22),barH=22*sc,barX=w-pad-barW,barY=(topH-barH)/2;
  ctx.fillStyle='#1a1a2a';ctx.fillRect(barX,barY,barW,barH);
  const frac=frustration/100;
  ctx.fillStyle=`rgb(${Math.round(255*frac)},${Math.round(200*(1-frac))},0)`;ctx.fillRect(barX,barY,barW*frac,barH);
  if(frustration>60){const pulse=Math.sin(gameTime*6)*0.3;if(pulse>0){ctx.fillStyle=`rgba(255,0,0,${pulse})`;ctx.fillRect(barX,barY,barW*frac,barH);}}
  ctx.strokeStyle='#555';ctx.lineWidth=sc;ctx.strokeRect(barX,barY,barW,barH);
  ctx.font=`bold ${Math.round(14*sc)}px "Courier New",monospace`;ctx.fillStyle='#ccddee';ctx.textAlign='right';
  ctx.fillText('Frustration',barX-8*sc,barY+barH*0.75);
  ctx.textAlign='center';ctx.fillStyle='#fff';ctx.font=`bold ${Math.round(13*sc)}px "Courier New",monospace`;
  ctx.fillText(`${Math.round(frustration)}%`,barX+barW/2,barY+barH*0.73);
  // Bottom bar
  ctx.fillStyle='rgba(10,10,26,0.85)';ctx.fillRect(0,h-botH,w,botH);
  const botFs=Math.round(16*sc);ctx.font=`bold ${botFs}px "Courier New",monospace`;
  ctx.fillStyle='#8899aa';ctx.textAlign='left';
  ctx.fillText('\u2191/W: Hop Up   \u2193/S: Hop Down   SPACE: Pause',pad,h-botH*0.35);
  ctx.textAlign='right';ctx.fillText(`Distance: ${(distance/100).toFixed(1)}k`,w-pad,h-botH*0.35);
  // Speed
  const speedHue=120*Math.min(1,scrollSpeed/4);
  ctx.fillStyle=`hsl(${speedHue},80%,60%)`;ctx.textAlign='center';
  ctx.fillText(`Speed: ${scrollSpeed.toFixed(1)}`,w*0.72,h-botH*0.35);
  const dlabel=getDifficultyLabel();const dcolors={Easy:'#44ff88',Medium:'#ffdd00',Hard:'#ff8844',Extreme:'#ff4444'};
  ctx.fillStyle=dcolors[dlabel]||'#888';ctx.fillText(dlabel,w*0.55,h-botH*0.35);
  // Decoherence warning
  const grace=4;
  if(timeSinceLastHop>grace*0.6){
    const urgency=Math.min(1,(timeSinceLastHop-grace*0.6)/(grace*0.8));
    const warnFs=Math.round(17*sc);ctx.font=`bold ${warnFs}px "Courier New",monospace`;ctx.textAlign='center';
    const alpha=0.5+0.5*Math.sin(gameTime*5);
    ctx.fillStyle=`rgba(255,${Math.round(180-urgency*130)},${Math.round(80-urgency*80)},${alpha*urgency})`;
    ctx.fillText('\u26a0 Decoherence drift: hop to stabilize! \u26a0',w/2,topH+22*sc);
  }
  if(activeCouplingZone&&state===STATE.PLAYING){
    const czFs=Math.round(20*sc);ctx.font=`bold ${czFs}px "Courier New",monospace`;ctx.textAlign='center';
    const yPos=topH+22*sc+(timeSinceLastHop>grace*0.6?24*sc:0);
    if(activeCouplingZone.type==='ci'){ctx.fillStyle=`rgba(255,255,255,${0.6+0.4*Math.sin(gameTime*8)})`;ctx.fillText('\u26a1 CONICAL INTERSECTION \u26a1',w/2,yPos);}
    else{ctx.fillStyle=`rgba(200,220,255,${0.6+0.4*Math.sin(gameTime*6)})`;ctx.fillText('~ Coupling Zone ~',w/2,yPos);}
  }
}

// --- Leaderboard Drawing ---
function drawLeaderboard(startY){
  const w=W(),sc=S();
  const fs=Math.round(15*sc);
  ctx.font=`bold ${Math.round(18*sc)}px "Courier New",monospace`;
  ctx.fillStyle='#ffcc44';ctx.textAlign='center';
  ctx.fillText('TOP 10 LEADERBOARD',w/2,startY);
  // Online status indicator
  const statusFs=Math.round(12*sc);
  ctx.font=`${statusFs}px "Courier New",monospace`;
  if(lbSyncing){ctx.fillStyle='#88aaff';ctx.fillText('syncing...',w/2,startY+16*sc);}
  else if(lbConfigured()){ctx.fillStyle='#44ff88';ctx.fillText('\u25cf online',w/2,startY+16*sc);}
  else{ctx.fillStyle='#ff8844';ctx.fillText('local only',w/2,startY+16*sc);}
  if(lbError){ctx.fillStyle='#ff6666';ctx.fillText('sync error: '+lbError,w/2,startY+28*sc);}
  let y=startY+34*sc;
  ctx.font=`${fs}px "Courier New",monospace`;
  if(leaderboard.length===0){
    ctx.fillStyle='#556';ctx.fillText('No scores yet',w/2,y);
    return;
  }
  for(let i=0;i<leaderboard.length;i++){
    const entry=leaderboard[i];
    const rank=`${i+1}.`.padStart(3);
    const name=(entry.name||'???').padEnd(12).slice(0,12);
    const pts=String(entry.score).padStart(8);
    const isHighlight=(state===STATE.GAMEOVER||state===STATE.NAME_INPUT)&&entry.score===score&&i===leaderboard.findIndex(e=>e.score===score);
    ctx.fillStyle=isHighlight?'#ffd700':(i<3?'#eef':'#889');
    ctx.textAlign='center';
    ctx.fillText(`${rank} ${name} ${pts}`,w/2,y);
    y+=Math.round(20*sc);
  }
}

function drawMenu(){
  const w=W(),h=H(),sc=S();
  drawGrid();const t=performance.now()/1000;
  ctx.globalAlpha=0.4;
  for(let s=0;s<NUM_SURFACES;s++){
    const p=new Path2D();
    for(let x=0;x<w;x+=3){const base=h*0.65+Math.sin(x*0.006+t*0.4)*35*sc+Math.sin(x*0.003+t*0.25)*20*sc;const y=base-s*45*sc-Math.sin(x*0.004+t*0.6+s*0.8)*15*sc;if(x===0)p.moveTo(x,y);else p.lineTo(x,y);}
    const rgb=SURFACE_RGB[s];
    ctx.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.15)`;ctx.lineWidth=6*sc;ctx.stroke(p);
    ctx.strokeStyle=SURFACE_COLORS[s];ctx.lineWidth=2*sc;ctx.stroke(p);
  }
  ctx.globalAlpha=1;
  ctx.textAlign='center';
  ctx.font=`bold ${Math.round(48*sc)}px "Courier New",monospace`;
  ctx.fillStyle='rgba(100,200,255,0.3)';ctx.fillText('FSSH Runner',w/2,h*0.15+2*sc);
  ctx.fillStyle='#eef';ctx.fillText('FSSH Runner',w/2,h*0.15);
  ctx.font=`${Math.round(22*sc)}px "Courier New",monospace`;ctx.fillStyle='#8899aa';
  ctx.fillText('Fewest Switches Surface Hopping',w/2,h*0.22);
  ctx.font=`${Math.round(19*sc)}px "Courier New",monospace`;ctx.fillStyle='#667788';
  ctx.fillText('Navigate the potential energy surfaces',w/2,h*0.28);
  // Legend
  const legendFs=Math.round(17*sc);ctx.font=`${legendFs}px "Courier New",monospace`;
  const legendY=h*0.35;const legendSpacing=110*sc;
  for(let s=0;s<NUM_SURFACES;s++){ctx.fillStyle=SURFACE_COLORS[s];const lx=w/2+(s-1.5)*legendSpacing;ctx.fillRect(lx-15*sc,legendY-6*sc,12*sc,12*sc);ctx.fillText(SURFACE_NAMES[s],lx+12*sc,legendY+5*sc);}
  // Start button
  const bw=280*sc,bh=50*sc;
  addButton('start',w/2-bw/2,h*0.42,bw,bh,'START GAME','#44ffaa');
  // Leaderboard
  drawLeaderboard(h*0.55);
}

// --- Game Loop ---
let lastTime=0;
let smoothScroll=0;// visual scroll position — smoothed to absorb vsync skips
function loop(timestamp){
  const dt=Math.min((timestamp-lastTime)/1000,0.05);
  lastTime=timestamp;
  // Physics update uses raw scrollOffset
  renderScroll=scrollOffset;
  update(dt);
  // Swap in Worker result if available (replaces cache with fresh data)
  applyWorkerCache();
  // If no cache at all yet (first frame / after reset), do one sync build
  if(!cacheValid)buildSurfaceCache();
  // Smooth visual scroll: limit per-frame advance to prevent vsync-skip jumps
  // Normal frame: diff ≈ scrollSpeed → follows exactly
  // Skipped frame: diff ≈ 2×scrollSpeed → capped, then gradually catches up (~10 frames)
  const dpr=devicePixelRatio;
  if(state===STATE.PLAYING){
    const diff=scrollOffset-smoothScroll;
    // maxAdvance = ~1.1 normal frames worth of scroll (allows ~10% catch-up rate)
    const maxAdvance=scrollSpeed*60/54;
    if(diff>0)smoothScroll+=Math.min(diff,Math.max(maxAdvance,1));
    else smoothScroll=scrollOffset;
    renderScroll=Math.round(smoothScroll*dpr)/dpr;
  }else{
    smoothScroll=scrollOffset;
    renderScroll=Math.round(scrollOffset*dpr)/dpr;
  }
  // Recompute playerY with render-aligned scroll so player sits exactly on drawn surface
  if(state===STATE.PLAYING&&cacheValid)playerY=cachedY(playerX,currentSurface);
  draw();
  // Fire off Worker for next frame (runs async in background)
  if(state===STATE.PLAYING)requestWorkerCache();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
